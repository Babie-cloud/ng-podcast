<!-- src/app/features/podcast/components/podcast-card/podcast-card.html -->
<div class="card h-100 shadow-sm">

  <!-- Image de couverture -->
  <a [routerLink]="['/podcasts', podcast.id]">
    <img
      [src]="podcast.coverUrl"
      [alt]="podcast.title"
      class="card-img-top"
      style="height: 180px; object-fit: cover;"
    />
  </a>

  <div class="card-body d-flex flex-column">

    <!-- Titre + auteur -->
    <h5 class="card-title mb-1">{{ podcast.title }}</h5>
    <p class="text-muted small mb-2">par {{ podcast.authorName }}</p>

    <!-- Description -->
    <p class="card-text text-muted flex-grow-1" style="
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    ">
      {{ podcast.description }}
    </p>

    <!-- Infos épisodes -->
    <p class="small text-muted mb-3">
      {{ podcast.episodes.length }} épisode(s)
      @if (podcast.createdAt) {
        — {{ podcast.createdAt | date:'dd/MM/yyyy' }}
      }
    </p>

    <!-- Boutons -->
    <div class="d-flex gap-2 mt-auto">

      @if (firstEpisode) {
        <button
          class="btn btn-primary btn-sm flex-grow-1"
          (click)="onPlay(firstEpisode)"
        >
          ▶ Écouter
        </button>
      } @else {
        <button class="btn btn-outline-secondary btn-sm flex-grow-1" disabled>
          Aucun épisode
        </button>
      }

      <!-- ✅ Bouton Détail — pas de texte autour de la balise -->
      <a 
        [routerLink]="['/podcasts', podcast.id]"
        class="btn btn-outline-secondary btn-sm"
      >Détail</a>

      <button
        class="btn btn-outline-danger btn-sm"
        (click)="onDelete()"
        title="Supprimer"
      >✕</button>

    </div>
  </div>

</div>
